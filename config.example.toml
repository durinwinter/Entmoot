# Entmoot node configuration — hardened example.
# Start with: entmoot --config entmoot.toml
#
# Hot reload: users, [[acl]], [[schema]], and the staleness settings below
# can be changed and picked up without a restart by editing this file and
# sending the node process SIGHUP (kill -HUP <pid>). Everything else
# (listeners, data_dir, TLS certs, ...) still needs a restart. A malformed
# file or invalid schema is logged and ignored — the node keeps running on
# its previous config, never half-applies a bad reload.

id = "ent-1"
mqtt_listen = "0.0.0.0:1883"
bus_listen = ["tcp/0.0.0.0:7447"]
peers = []                        # e.g. ["tcp/10.0.0.2:7447", "tcp/10.0.0.3:7447"]
scope = "entmoot"                 # namespace prefix on a shared Entmoot bus fabric
max_packet_size = 262144
max_connections = 10000
max_publish_rate = 500            # msgs/s per connection; violators disconnected; 0 = off
data_dir = "/var/lib/entmoot"     # retained state + offline persistent-session queues
metrics_listen = "0.0.0.0:9464"  # Prometheus /metrics endpoint
health_listen = "0.0.0.0:9465"   # Kubernetes /healthz and /readyz probes
session_expiry_secs = 86400      # discard offline persistent sessions after this age; 0 = never
max_queued_per_session = 1000    # offline QoS 1 queue bound per persistent session
slow_consumer_grace_ms = 5000     # evict a client whose outbound queue stays full this long; 0 = never
sys_interval_secs = 10            # publish $SYS/broker/<id>/... node stats; 0 = off
connect_admission_rate = 0        # max new CONNECTs/s let through to auth/session work; 0 = off
connect_admission_burst = 0       # burst allowance for connect_admission_rate; clamped to >= the rate
churn_max_reconnects = 0          # quarantine a client id reconnecting this many times per window; 0 = off
churn_window_secs = 60            # rolling window churn_max_reconnects is measured over
churn_cooldown_secs = 300         # how long a flapping client is quarantined once caught
retained_staleness_secs = 0       # default staleness bound for retained delivery; 0 = off ($meta/<topic> if exceeded)

# Per-namespace staleness overrides; first match wins, else retained_staleness_secs applies.
# [[staleness]]
# filter = "plant/kiln1/#"
# bound_secs = 5

# zenoh_link_mtu = 1200            # cap Zenoh's wire batch size in bytes; measure the real
                                    # path MTU first with scripts/mtu-sweep.sh. Unset = Zenoh default (65535).

[tls]                             # remove this section for plain MQTT only
listen = "0.0.0.0:8883"
cert_file = "/etc/entmoot/server.pem"
key_file = "/etc/entmoot/server.key"

[auth]
allow_anonymous = false
default_policy = "deny"           # "allow" ignores the [[acl]] entries below

[[auth.users]]
name = "plc1"
# entmoot --hash-password 'the-password'
password_sha256 = "5db1fee4b5703808c48078a76768b155b421b210c0761cd6a5d223f4d99f1eaa"

[[auth.users]]
name = "scada"
password_sha256 = "5db1fee4b5703808c48078a76768b155b421b210c0761cd6a5d223f4d99f1eaa"

# Bearer-token auth: additive to the users above. When a CONNECT's username
# doesn't match a local user, its password is tried as a JWT (HS256, static
# shared secret — no JWKS/OIDC discovery). identity_claim's value becomes
# the authenticated identity for ACL matching.
# [auth.jwt]
# hmac_secret = "change-me-to-a-real-shared-secret"
# identity_claim = "sub"           # default
# issuer = "https://idp.example.com/"
# audience = "entmoot"

[[acl]]
user = "plc1"
publish = ["plant/#"]
subscribe = ["cmd/plc1/#"]

[[acl]]
user = "scada"
publish = ["cmd/#"]
subscribe = ["plant/#"]

# Data validation: a publish on a matching topic must conform to the given
# JSON Schema, or on_fail applies ("drop" acked-but-not-delivered, the
# default, or "disconnect"). First matching rule wins.
# [[schema]]
# filter = "plant/+/temp"
# schema = '{"type":"object","properties":{"value":{"type":"number"}},"required":["value"]}'
# on_fail = "drop"
